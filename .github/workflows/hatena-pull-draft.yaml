name: Hatena - Pull Draft

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Draft Entry Title"
        required: true
  workflow_call:
    inputs:
      title:
        required: true
        type: string
      draft:
        default: true
        type: boolean
      BLOG_DOMAIN:
        required: true
        type: string
    secrets:
      OWNER_API_KEY:
        required: true

jobs:
  pull-draft:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./hatena
    env:
      BLOGSYNC_PASSWORD: ${{ secrets.OWNER_API_KEY }}
      ENTRY_TITLE: ${{ inputs.title }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: setup
        uses: hatena/hatenablog-workflows/.github/actions/setup@b18a558b9ea673d8957fba299824d182d1b63513 # v2.1.0
      - name: set blog domain
        id: set-domain
        run: |
          domain=${{ vars.BLOG_DOMAIN }}
          echo "BLOG_DOMAIN=$(echo $domain | tr -d '\n\r ')" >> "$GITHUB_OUTPUT"
      - name: pull
        run: |
          blogsync pull ${{ steps.set-domain.outputs.BLOG_DOMAIN }}
      - name: set entry path
        id: set-entry-path
        run: |
          files=($(git ls-files -o --exclude-standard))
          for file in ${files[@]}; do
            title=$(yq --front-matter=extract '.Title' "$file")
            if [[ "$title" == "$ENTRY_TITLE" ]]; then
              entry_path="$file"
            fi
          done
          if [[ -z "$entry_path" ]]; then
            echo "Error: No draft entry titled ${ENTRY_TITLE} was found"
            exit 1
          fi
          echo "ENTRY_PATH=$entry_path" >> $GITHUB_OUTPUT
      - name: pull draft by title
        uses: ./.github/actions/create-draft-pull-request
        with:
          title: ${{ inputs.title }}
          draft: ${{ inputs.draft }}
          BLOG_DOMAIN: ${{ steps.set-domain.outputs.BLOG_DOMAIN }}
          ENTRY_PATH: ${{ steps.set-entry-path.outputs.ENTRY_PATH }}
